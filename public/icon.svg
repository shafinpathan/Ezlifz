<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#48484a"/>
      <stop offset="100%" stop-color="#1c1c1e"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="40%" y2="90%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.28)"/>
      <stop offset="55%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <clipPath id="rr">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>
  <!-- Base -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Liquid glass sheen -->
  <ellipse cx="190" cy="150" rx="310" ry="220" fill="url(#sheen)" clip-path="url(#rr)"/>
  <!-- Top edge highlight -->
  <rect x="24" y="22" width="464" height="72" rx="56" fill="rgba(255,255,255,0.07)"/>
  <!-- Border -->
  <rect x="1.5" y="1.5" width="509" height="509" rx="111" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
  <!-- EZ -->
  <text
    x="256" y="340"
    text-anchor="middle"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="240"
    font-weight="900"
    fill="white"
    fill-opacity="0.95"
    letter-spacing="-8"
  >EZ</text>
</svg>
